description: >-
  FinOps view of Signaturely API spend. Signaturely bills API access as a flat
  monthly subscription chosen from three tiers (Gold $49, Platinum $99, Titanium
  $199), each of which bundles a fixed monthly allowance of API signature requests
  (50 / 150 / 500) and a template cap (5 / 25 / unlimited). The dominant cost
  driver is the number of signature requests sent per month, which determines the
  required tier. Testing is free until the first real signature request. Annual
  billing reduces effective monthly cost by roughly 20%.
notes: >-
  Overage / per-additional-request pricing beyond a tier's monthly allowance is not
  itemized on the public pricing page; in practice, exceeding the allowance means
  moving up a tier. Verify current rates and any overage terms during
  reconciliation.
