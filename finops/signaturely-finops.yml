meters:
- name: api_signature_requests
  description: Number of API signature requests sent per month; the primary cost driver that determines the required plan tier (50 Gold / 150 Platinum / 500 Titanium).
  unit: requests
  aggregation: sum
  dimensions:
  - account
  - plan
- name: templates
  description: Number of reusable templates stored; capped per plan tier (5 / 25 / unlimited).
  unit: templates
  aggregation: max
  dimensions:
  - account
  - plan
- name: plan_subscription
  description: Flat monthly (or annual) API plan subscription fee.
  unit: months
  aggregation: sum
  dimensions:
  - account
  - plan
principles:
- name: Visibility
  description: Track monthly API signature-request volume against your plan's included allowance so you can see when you are approaching a tier boundary.
- name: Allocation
  description: Tag signature requests and templates by internal team or workflow so API-plan cost maps to the business processes that generate signatures.
- name: Optimization
  description: Right-size the plan tier to actual monthly request volume; consolidate reusable templates to stay within the tier cap; use annual billing (~20% savings) for steady workloads; test for free before committing.
- name: Accountability
  description: Assign an owner for the API subscription and review monthly request counts against the plan allowance to decide when to upgrade or downgrade.
