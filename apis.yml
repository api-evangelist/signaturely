apis:
- aid: signaturely:signaturely-signature-requests-api
  name: Signaturely Signature Requests API
  tags:
  - Signature Requests
  - Templates
  - Bulk Send
  image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
  humanURL: https://docs.signaturely.com/
  baseURL: https://api.signaturely.com/api/v1
  properties:
  - url: https://signaturely.com/api
    type: Overview
  - url: https://docs.signaturely.com/
    type: Documentation
  - url: openapi/signaturely-openapi.yml
    type: OpenAPI
  description: Create signature requests by populating a saved template with signers
    and field values, and bulk-send a single-signer template against CSV data to
    generate many signature requests at once. Signers (name and email) are supplied
    inline on the request - there is no standalone contacts resource.
- aid: signaturely:signaturely-documents-api
  name: Signaturely Documents API
  tags:
  - Documents
  - Downloads
  - Reminders
  image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
  humanURL: https://docs.signaturely.com/
  baseURL: https://api.signaturely.com/api/v1
  properties:
  - url: https://docs.signaturely.com/
    type: Documentation
  - url: openapi/signaturely-openapi.yml
    type: OpenAPI
  description: List and delete documents, list a document's signers, read its
    activity log, get signed-document download URLs and shareable signing links,
    share a document, send signing reminders, revert a document, and fetch the most
    recent sent document.
- aid: signaturely:signaturely-templates-api
  name: Signaturely Templates API
  tags:
  - Templates
  - Reusable Documents
  image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
  humanURL: https://docs.signaturely.com/
  baseURL: https://api.signaturely.com/api/v1
  properties:
  - url: https://docs.signaturely.com/
    type: Documentation
  - url: openapi/signaturely-openapi.yml
