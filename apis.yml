aid: signaturely
url: https://raw.githubusercontent.com/api-evangelist/signaturely/refs/heads/main/apis.yml
name: Signaturely
kind: company
description: >-
  Signaturely is simple electronic signature software for sending, signing, and
  managing legally binding documents online. Beyond the web app, Signaturely offers
  a documented public REST API (base https://api.signaturely.com/api/v1) gated
  behind separately billed API plans (Gold, Platinum, Titanium). The API is
  authenticated with an API key ("Authorization: Api-Key {API_KEY}") issued from the
  account API settings, with OAuth, embedded signing, and embedded requesting
  available on higher tiers. It lets developers send signature requests from
  templates, bulk-send from CSV data, manage documents (list, download, share, send
  reminders, revert, activity), manage templates and folders, manage team members,
  and subscribe to webhooks for document events. There is no separate "contacts"
  resource; signers are supplied inline on each signature request.
image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
tags:
- Electronic Signature
- eSignature
- Document Signing
- E-Signature API
- Contracts
- Signature Requests
- SaaS
